        function CanvasApp() {
            const svgRef = useRef(null);
            const fileInputRef = useRef(null);
            const imageInputRef = useRef(null);
            const patternInputRef = useRef(null);
            
            // --- STATE: Historia (Undo/Redo) ---
            const [history, setHistory] = useState(() => {
                try {
                    const saved = localStorage.getItem('drawing_history_pro_v3');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        return parsed.history && parsed.history.length > 0 ? parsed.history : [[]];
                    }
                } catch (e) {}
                return [[]];
            });
            const [historyStep, setHistoryStep] = useState(() => {
                try {
                    const saved = localStorage.getItem('drawing_history_pro_v3');
                    if (saved) return JSON.parse(saved).step || 0;
                } catch (e) {}
                return 0;
            });
            
            const shapes = history[historyStep] || [];

            useEffect(() => {
                localStorage.setItem('drawing_history_pro_v3', JSON.stringify({ history, step: historyStep }));
            }, [history, historyStep]);

            const commitShapes = (newShapesArray) => {
                const newHistory = history.slice(0, historyStep + 1);
                newHistory.push(newShapesArray);
                setHistory(newHistory);
                setHistoryStep(newHistory.length - 1);
            };

            const undo = () => { if (historyStep > 0) setHistoryStep(prev => prev - 1); };
            const redo = () => { if (historyStep < history.length - 1) setHistoryStep(prev => prev + 1); };

            // --- STATE: UI i Narzędzia ---
            const [isDrawing, setIsDrawing] = useState(false);
            const [currentStroke, setCurrentStroke] = useState([]);
            const [selectedShapeIndex, setSelectedShapeIndex] = useState(null);
            const activePointers = useRef(new Map());
            const gestureStart = useRef(null);

            const [activeTool, setActiveTool] = useState('smoother'); 
            const [smoothAmount, setSmoothAmount] = useState(50);
            const [forceCloseShape, setForceCloseShape] = useState(true);
            const [globalColor, setGlobalColor] = useState('#000000');
            const [showRightPanel, setShowRightPanel] = useState(false);
            const [bgImage, setBgImage] = useState({ url: null, width: 0, height: 0, x: 0, y: 0, scale: 1, angle: 0, opacity: 0.7 });

            useEffect(() => {
                document.getElementById('loading').style.display = 'none';
                const preventScroll = (e) => e.preventDefault();
                const svgElement = svgRef.current;
                if (svgElement) svgElement.addEventListener('touchmove', preventScroll, { passive: false });
                return () => { if (svgElement) svgElement.removeEventListener('touchmove', preventScroll); };
            }, []);

            useEffect(() => {
                if (activeTool !== 'select') setSelectedShapeIndex(null);
            }, [activeTool]);

            const getCoordinates = (e) => {
                const rect = svgRef.current.getBoundingClientRect();
                return { x: e.clientX - rect.left, y: e.clientY - rect.top };
            };

            // --- INTERAKCJE ---
            const handlePointerDown = (e) => {
                activePointers.current.set(e.pointerId, getCoordinates(e));
                svgRef.current.setPointerCapture(e.pointerId);

                if (activePointers.current.size === 2 && bgImage.url) {
                    setIsDrawing(false); setCurrentStroke([]);
                    const pts = Array.from(activePointers.current.values());
                    const center = { x: (pts[0].x + pts[1].x)/2, y: (pts[0].y + pts[1].y)/2 };
                    const dist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
                    const angle = Math.atan2(pts[1].y - pts[0].y, pts[1].x - pts[0].x);
                    gestureStart.current = { imgX: bgImage.x, imgY: bgImage.y, imgScale: bgImage.scale, imgAngle: bgImage.angle, startX: center.x, startY: center.y, startDist: dist, startAngle: angle };
                } 
                else if (activePointers.current.size === 1) {
                    if (activeTool === 'snapper' || activeTool === 'smoother') {
                        setIsDrawing(true); setCurrentStroke([getCoordinates(e)]);
                    }
                    if (activeTool === 'select' && e.target.tagName === 'svg') setSelectedShapeIndex(null);
                }
            };

            const handlePointerMove = (e) => {
                if (!activePointers.current.has(e.pointerId)) return;
                activePointers.current.set(e.pointerId, getCoordinates(e));

                if (activePointers.current.size === 2 && bgImage.url && gestureStart.current) {
                    const pts = Array.from(activePointers.current.values());
                    const center = { x: (pts[0].x + pts[1].x)/2, y: (pts[0].y + pts[1].y)/2 };
                    const dist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
                    const angle = Math.atan2(pts[1].y - pts[0].y, pts[1].x - pts[0].x);
                    const gs = gestureStart.current;

                    setBgImage(prev => ({
                        ...prev, x: gs.imgX + (center.x - gs.startX), y: gs.imgY + (center.y - gs.startY),
                        scale: gs.imgScale * (dist / gs.startDist), angle: gs.imgAngle + (angle - gs.startAngle) * (180 / Math.PI)
                    }));
                } 
                else if (activePointers.current.size === 1 && isDrawing) {
                    const pt = getCoordinates(e);
                    setCurrentStroke((prev) => {
                        if (prev.length === 0) return [pt];
                        const last = prev[prev.length - 1];
                        if (Math.hypot(pt.x - last.x, pt.y - last.y) > 3) return [...prev, pt];
                        return prev;
                    });
                }
            };

            const handlePointerUp = (e) => {
                activePointers.current.delete(e.pointerId);
                svgRef.current.releasePointerCapture(e.pointerId);

                if (activePointers.current.size === 0) {
                    gestureStart.current = null;
                    if (isDrawing) {
                        setIsDrawing(false);
                        if (currentStroke.length > 4) {
                            try {
                                let newShape;
                                if (activeTool === 'snapper') newShape = processSnapper(currentStroke, globalColor);
                                else if (activeTool === 'smoother') newShape = processBezierSmoother(currentStroke, globalColor, smoothAmount, forceCloseShape);
                                commitShapes([...shapes, newShape]);
                            } catch (err) { console.error(err); }
                        }
                        setCurrentStroke([]);
                    }
                }
            };

            const handleShapeClick = (e, index) => {
                if (activeTool === 'eraser') {
                    e.stopPropagation();
                    commitShapes(shapes.filter((_, i) => i !== index));
                } else if (activeTool === 'select') {
                    e.stopPropagation();
                    setSelectedShapeIndex(index);
                    setShowRightPanel(true);
                }
            };

            const updateSelectedShape = (updates) => {
                if (selectedShapeIndex === null) return;
                const newShapes = [...shapes];
                newShapes[selectedShapeIndex] = { ...newShapes[selectedShapeIndex], ...updates };
                commitShapes(newShapes);
            };

            // --- WGRYWANIE WZORU SVG (CUSTOM PATTERN) ---
            const handlePatternUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const text = event.target.result;
                    if (text.includes('<svg')) {
                        // Bezpieczne ładowanie SVG jako Data URL do wykorzystania w znaczniku <image>
                        const encoded = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(text)));
                        updateSelectedShape({ customPatternSvg: encoded });
                    } else {
                        alert("Wybrany plik nie wygląda na poprawny plik SVG.");
                    }
                };
                reader.readAsText(file);
                e.target.value = null;
            };

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const url = URL.createObjectURL(file);
                const img = new Image();
                img.onload = () => {
                    const svgRect = svgRef.current.getBoundingClientRect();
                    const initScale = Math.min((svgRect.width * 0.8) / img.width, (svgRect.height * 0.8) / img.height);
                    setBgImage({ url, width: img.width, height: img.height, x: svgRect.width / 2, y: svgRect.height / 2, scale: initScale, angle: 0, opacity: 0.7 });
                    setShowRightPanel(true);
                };
                img.src = url;
                e.target.value = null;
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const doc = new DOMParser().parseFromString(event.target.result, "image/svg+xml");
                        const newShapes = [];
                        doc.querySelectorAll('ellipse').forEach(el => {
                            const transform = el.getAttribute('transform') || '';
                            let angle = 0;
                            const rotateMatch = transform.match(/rotate\(([^ ]+) /);
                            if (rotateMatch) angle = parseFloat(rotateMatch[1]);
                            newShapes.push({
                                type: 'ellipse', 
                                cx: parseFloat(el.getAttribute('cx')||0), cy: parseFloat(el.getAttribute('cy')||0),
                                rx: parseFloat(el.getAttribute('rx')||0), ry: parseFloat(el.getAttribute('ry')||0),
                                angle: angle, color: el.getAttribute('stroke') || '#000000', fillPattern: null
                            });
                        });
                        doc.querySelectorAll('path').forEach(el => {
                            newShapes.push({
                                type: 'bezierPath', d: el.getAttribute('d'),
                                color: el.getAttribute('stroke') || '#000000', fillPattern: null
                            });
                        });
                        if (newShapes.length > 0) commitShapes([...shapes, ...newShapes]);
                    } catch (err) { alert("Błąd odczytu pliku SVG."); }
                };
                reader.readAsText(file);
                e.target.value = null;
            };

            // --- SILNIK ---
            const processSnapper = (points, strokeColor) => {
                const pStart = points[0], pEnd = points[points.length - 1];
                const closureDistance = Math.hypot(pEnd.x - pStart.x, pEnd.y - pStart.y);
                let pathLength = 0;
                for (let i = 1; i < points.length; i++) pathLength += Math.hypot(points[i].x - points[i-1].x, points[i].y - points[i-1].y);

                if (closureDistance < (pathLength * 0.2) && points.length > 15) {
                    let maxD = 0, p1 = points[0], p2 = points[0];
                    const step = Math.max(1, Math.floor(points.length / 50)); 
                    for (let i = 0; i < points.length; i += step) {
                        for (let j = i + step; j < points.length; j += step) {
                            const d = Math.hypot(points[j].x - points[i].x, points[j].y - points[i].y);
                            if (d > maxD) { maxD = d; p1 = points[i]; p2 = points[j]; }
                        }
                    }
                    const cx = (p1.x + p2.x) / 2, cy = (p1.y + p2.y) / 2, rx = maxD / 2;
                    const angleRad = Math.atan2(p2.y - p1.y, p2.x - p1.x), angleDeg = angleRad * (180 / Math.PI);
                    let maxRy = 0;
                    for (let i = 0; i < points.length; i++) {
                        const d = Math.abs((p2.x - p1.x) * (p1.y - points[i].y) - (p1.x - points[i].x) * (p2.y - p1.y)) / maxD;
                        if (d > maxRy) maxRy = d;
                    }
                    return { type: 'ellipse', cx, cy, rx, ry: maxRy, angle: angleDeg, color: strokeColor, fillPattern: null, patternScale: 1, patternSpacing: 0, patternLayout: 'grid' };
                } else {
                    return { type: 'rawPath', points: [...points], color: strokeColor, fillPattern: null, patternScale: 1, patternSpacing: 0, patternLayout: 'grid' };
                }
            };

            const processBezierSmoother = (points, strokeColor, amount, forceClosed) => {
                let pts = [...points];
                const isClosed = forceClosed && pts.length > 3; 
                if (isClosed) pts.push({ x: pts[0].x, y: pts[0].y });
                const tolerance = amount === 0 ? 0.5 : (amount / 100) * 20; 
                const simplifiedPoints = simplifyPath(pts, tolerance);
                const svgPathD = pointsToBezierSVG(simplifiedPoints, isClosed);
                return { type: 'bezierPath', d: svgPathD, color: strokeColor, fillPattern: null, patternScale: 1, patternSpacing: 0, patternLayout: 'grid' };
            };

            const simplifyPath = (points, tolerance) => {
                if (points.length <= 2) return points;
                let maxDist = 0, index = 0, end = points.length - 1;
                for (let i = 1; i < end; i++) {
                    const dx = points[end].x - points[0].x, dy = points[end].y - points[0].y;
                    const mag = Math.hypot(dx, dy);
                    const dist = mag > 0 ? Math.abs(dx * (points[0].y - points[i].y) - (points[0].x - points[i].x) * dy) / mag : Math.hypot(points[i].x - points[0].x, points[i].y - points[0].y);
                    if (dist > maxDist) { maxDist = dist; index = i; }
                }
                if (maxDist > tolerance) {
                    const left = simplifyPath(points.slice(0, index + 1), tolerance);
                    const right = simplifyPath(points.slice(index), tolerance);
                    return left.slice(0, -1).concat(right);
                } else return [points[0], points[end]];
            };

            const pointsToBezierSVG = (points, isClosed) => {
                if (points.length < 3) return `M ${points.map(p => `${p.x},${p.y}`).join(' L ')}`;
                let pts = [...points];
                if (isClosed) { pts.unshift(pts[pts.length - 2]); pts.push(pts[1]); } 
                else { pts.unshift(pts[0]); pts.push(pts[pts.length - 1]); }
                let d = `M ${pts[1].x.toFixed(2)},${pts[1].y.toFixed(2)}`;
                for (let i = 1; i < pts.length - 2; i++) {
                    const cp1x = pts[i].x + (pts[i+1].x - pts[i-1].x) * 0.2, cp1y = pts[i].y + (pts[i+1].y - pts[i-1].y) * 0.2;
                    const cp2x = pts[i+1].x - (pts[i+2].x - pts[i].x) * 0.2, cp2y = pts[i+1].y - (pts[i+2].y - pts[i].y) * 0.2;
                    d += ` C ${cp1x.toFixed(2)},${cp1y.toFixed(2)} ${cp2x.toFixed(2)},${cp2y.toFixed(2)} ${pts[i+1].x.toFixed(2)},${pts[i+1].y.toFixed(2)}`;
                }
                if (isClosed) d += ' Z';
                return d;
            };

            // --- RENDEROWANIE WZORU ---
            const getPatternDetails = (s) => {
                const sc = s.patternScale || 1;
                const sp = s.patternSpacing || 0;
                const S = 30 * sc; // Bazowy rozmiar obrazka
                const W = S + sp; // Szerokość jednego "segmentu" z odstępem
                let pWidth = W, pHeight = W;
                const layout = s.patternLayout || 'grid';
                if (layout === 'offset') pHeight = 2 * W;
                if (layout === 'hex') pHeight = 2 * (W * 0.866);
                return { sc, sp, S, W, pWidth, pHeight, layout };
            };

            // --- EKSPORT (Natywne Zapisz Jako / Fallback) ---
            const exportCleanSVG = async () => {
                const rect = svgRef.current.getBoundingClientRect();
                
                let defsHtml = '<defs>';
                shapes.forEach((s, i) => {
                    if (s.fillPattern) {
                        const { sp, S, W, pWidth, pHeight, layout } = getPatternDetails(s);
                        defsHtml += `<pattern id="exp-pat-${i}" width="${pWidth}" height="${pHeight}" patternUnits="userSpaceOnUse">`;
                        
                        const getContent = (x, y) => {
                            if (s.fillPattern === 'custom' && s.customPatternSvg) {
                                return `<image x="${x}" y="${y}" width="${S}" height="${S}" href="${s.customPatternSvg}" preserveAspectRatio="xMidYMid meet" />`;
                            } else if (s.fillPattern === 'dots') {
                                return `<circle cx="${x + S/2}" cy="${y + S/2}" r="${S*0.2}" fill="${s.color}" />`;
                            } else if (s.fillPattern === 'grid') {
                                return `<path d="M ${x+S} ${y} L ${x} ${y} L ${x} ${y+S}" fill="none" stroke="${s.color}" stroke-width="${Math.max(1, S*0.05)}"/>`;
                            } else if (s.fillPattern === 'lines') {
                                return `<line x1="${x}" y1="${y+S}" x2="${x+S}" y2="${y}" stroke="${s.color}" stroke-width="${Math.max(2, S*0.1)}" stroke-linecap="square"/>`;
                            }
                            return '';
                        };

                        defsHtml += getContent(sp/2, sp/2);
                        if (layout === 'offset' || layout === 'hex') {
                            const yOff = layout === 'hex' ? W*0.866 : W;
                            defsHtml += getContent(sp/2 + W/2, sp/2 + yOff);
                            defsHtml += getContent(sp/2 - W/2, sp/2 + yOff); // Dla poprawnego zawijania na brzegach
                        }
                        defsHtml += `</pattern>`;
                    }
                });
                defsHtml += '</defs>';

                let shapesHtml = '';
                shapes.forEach((s, i) => {
                    const fillStr = s.fillPattern ? `url(#exp-pat-${i})` : 'none';
                    if (s.type === 'ellipse') {
                        shapesHtml += `<ellipse cx="${s.cx}" cy="${s.cy}" rx="${s.rx}" ry="${s.ry}" fill="${fillStr}" stroke="${s.color}" stroke-width="4" transform="rotate(${s.angle} ${s.cx} ${s.cy})" stroke-linecap="round" stroke-linejoin="round" />`;
                    } else if (s.type === 'bezierPath' || s.type === 'rawPath') {
                        const d = s.d || `M ${s.points.map(p => `${p.x},${p.y}`).join(' L ')}`;
                        shapesHtml += `<path d="${d}" fill="${fillStr}" stroke="${s.color}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />`;
                    }
                });

                const svgString = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${rect.width} ${rect.height}" width="${rect.width}" height="${rect.height}">${defsHtml}${shapesHtml}</svg>`;
                
                // Nowoczesne API do zapisu (Wybór folderu)
                if (window.showSaveFilePicker) {
                    try {
                        const handle = await window.showSaveFilePicker({
                            suggestedName: 'Rysunek_Pro.svg',
                            types: [{ description: 'Plik SVG', accept: {'image/svg+xml': ['.svg']} }],
                        });
                        const writable = await handle.createWritable();
                        await writable.write(svgString);
                        await writable.close();
                        return; // Sukces
                    } catch (err) {
                        if (err.name === 'AbortError') return; // Użytkownik anulował okienko
                    }
                }
                
                // Fallback dla przeglądarek bez wsparcia (Safari / iOS)
                const blob = new Blob([svgString], {type: "image/svg+xml;charset=utf-8"});
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = "Rysunek_Pro.svg";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            const colors = ['#000000', '#FFFFFF', '#FC0FC0', '#00F6FF', '#F9F808', '#FF3B30', '#4CD964', '#007AFF'];
            const activeShape = selectedShapeIndex !== null ? shapes[selectedShapeIndex] : null;

            return (
                <div className="flex h-screen w-screen overflow-hidden bg-slate-200">
                    
                    {/* Ukryte inputy */}
                    <input type="file" accept=".svg" ref={fileInputRef} onChange={handleFileChange} className="hidden" />
                    <input type="file" accept="image/*" ref={imageInputRef} onChange={handleImageChange} className="hidden" />
                    <input type="file" accept=".svg" ref={patternInputRef} onChange={handlePatternUpload} className="hidden" />

                    {/* --- LEWY PANEL NARZĘDZI --- */}
                    <div className="w-16 bg-white border-r border-slate-300 flex flex-col items-center py-4 z-20 shrink-0 shadow-lg relative z-30">
                        <div className="flex flex-col gap-3 w-full px-2">
                            <button onClick={() => setActiveTool('snapper')} title="Auto-Elipsy" className={`p-2.5 rounded-xl flex justify-center transition-all ${activeTool === 'snapper' ? 'bg-indigo-100 text-indigo-600 shadow-sm ring-1 ring-indigo-300' : 'text-slate-500 hover:bg-slate-100'}`}><IconCircle /></button>
                            <button onClick={() => setActiveTool('smoother')} title="Płynne Krzywe" className={`p-2.5 rounded-xl flex justify-center transition-all ${activeTool === 'smoother' ? 'bg-indigo-100 text-indigo-600 shadow-sm ring-1 ring-indigo-300' : 'text-slate-500 hover:bg-slate-100'}`}><IconWave /></button>
                            <button onClick={() => setActiveTool('select')} title="Kursor (Wybieranie i Wypełnianie)" className={`p-2.5 rounded-xl flex justify-center transition-all ${activeTool === 'select' ? 'bg-amber-100 text-amber-600 shadow-sm ring-1 ring-amber-300' : 'text-slate-500 hover:bg-slate-100'}`}><IconSelect /></button>
                            <button onClick={() => {setActiveTool('eraser'); setShowRightPanel(false);}} title="Gumka" className={`p-2.5 rounded-xl flex justify-center transition-all ${activeTool === 'eraser' ? 'bg-red-100 text-red-600 shadow-sm ring-1 ring-red-300' : 'text-slate-500 hover:bg-slate-100'}`}><IconEraser /></button>
                        </div>
                        <div className="w-10 h-px bg-slate-200 my-4"></div>
                        <div className="flex flex-col gap-3 w-full px-2">
                            <button onClick={() => { if(!bgImage.url) imageInputRef.current.click(); else setShowRightPanel(true); }} title="Obraz Referencyjny (Kalka)" className={`p-2.5 rounded-xl flex justify-center transition-all relative ${bgImage.url ? 'bg-emerald-100 text-emerald-600 shadow-sm' : 'text-slate-500 hover:bg-slate-100'}`}>
                                <IconImage />
                                {bgImage.url && <span className="absolute top-1 right-1 w-2.5 h-2.5 bg-emerald-500 rounded-full border-2 border-white"></span>}
                            </button>
                        </div>
                    </div>

                    {/* --- GŁÓWNY OBSZAR --- */}
                    <div className="flex-1 flex flex-col relative overflow-hidden">
                        
                        {/* --- GÓRNY PASEK WŁAŚCIWOŚCI --- */}
                        <div className="h-14 bg-white border-b border-slate-300 flex items-center justify-between px-4 z-20 shadow-sm shrink-0">
                            
                            <div className="flex items-center gap-6 overflow-x-auto">
                                {(activeTool === 'smoother' || activeTool === 'snapper') && (
                                    <div className="flex items-center gap-4">
                                        <div className="flex items-center gap-2 shrink-0">
                                            {colors.map(c => (
                                                <button key={c} onClick={() => setGlobalColor(c)} className={`w-6 h-6 rounded-full border ${globalColor === c ? 'scale-110 ring-2 ring-offset-1 ring-slate-400 border-transparent' : 'border-slate-300 hover:scale-110'}`} style={{ backgroundColor: c }} />
                                            ))}
                                        </div>
                                        {activeTool === 'smoother' && (
                                            <div className="flex items-center gap-3 border-l border-slate-200 pl-4 shrink-0">
                                                <label className="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
                                                    <input type="checkbox" checked={forceCloseShape} onChange={(e) => setForceCloseShape(e.target.checked)} />
                                                    Domknij
                                                </label>
                                                <span className="text-sm text-slate-500 ml-2">Wygładzanie:</span>
                                                <input type="range" min="0" max="100" step="5" value={smoothAmount} onChange={(e) => setSmoothAmount(parseInt(e.target.value))} className="w-20" />
                                            </div>
                                        )}
                                    </div>
                                )}

                                {activeTool === 'select' && !activeShape && (
                                    <span className="text-sm font-medium text-slate-500">Wybierz kształt na płótnie, aby go edytować (dodać wzór).</span>
                                )}

                                {activeTool === 'select' && activeShape && (
                                    <div className="flex items-center gap-4 shrink-0">
                                        <span className="text-sm font-bold text-amber-600">Edycja:</span>
                                        <div className="flex items-center gap-2">
                                            {colors.map(c => (
                                                <button key={c} onClick={() => updateSelectedShape({ color: c })} className={`w-6 h-6 rounded-full border ${activeShape.color === c ? 'scale-110 ring-2 ring-offset-1 ring-amber-400 border-transparent' : 'border-slate-300'}`} style={{ backgroundColor: c }} />
                                            ))}
                                        </div>
                                        
                                        <div className="border-l border-slate-200 pl-4 flex items-center gap-2">
                                            <IconPattern />
                                            <select 
                                                className="text-sm border border-slate-300 rounded p-1 bg-slate-50 outline-none"
                                                value={activeShape.fillPattern || ''}
                                                onChange={(e) => {
                                                    const val = e.target.value;
                                                    updateSelectedShape({ fillPattern: val || null });
                                                    if (val) setShowRightPanel(true);
                                                }}
                                            >
                                                <option value="">Brak Wypełnienia</option>
                                                <option value="dots">Kropki</option>
                                                <option value="grid">Siatka</option>
                                                <option value="lines">Paski</option>
                                                <option value="custom">Własny SVG...</option>
                                            </select>
                                        </div>
                                        
                                        <button onClick={() => setShowRightPanel(true)} className="ml-2 px-3 py-1 bg-slate-100 hover:bg-slate-200 text-xs font-medium rounded border border-slate-200 text-slate-700">
                                            Opcje Wzoru
                                        </button>
                                    </div>
                                )}
                            </div>

                            <div className="flex items-center gap-2 shrink-0">
                                <button onClick={undo} disabled={historyStep === 0} title="Cofnij" className="p-2 text-slate-600 hover:bg-slate-100 rounded disabled:opacity-30"><IconUndo /></button>
                                <button onClick={redo} disabled={historyStep === history.length - 1} title="Ponów" className="p-2 text-slate-600 hover:bg-slate-100 rounded disabled:opacity-30"><IconRedo /></button>
                                <div className="w-px h-6 bg-slate-300 mx-1"></div>
                                <button onClick={() => {if(confirm("Wyczyścić wektory?")) commitShapes([]);}} title="Wyczyść" className="p-2 text-red-500 hover:bg-red-50 rounded"><IconTrash /></button>
                                <button onClick={() => fileInputRef.current.click()} title="Import SVG" className="p-2 text-slate-600 hover:bg-slate-100 rounded"><IconUpload /></button>
                                <button onClick={exportCleanSVG} disabled={shapes.length === 0} className="flex items-center px-3 py-1.5 bg-sky-600 hover:bg-sky-700 text-white text-sm font-medium rounded shadow disabled:opacity-50 ml-2">
                                    <IconDownload /> <span className="ml-2">Zapisz Jako</span>
                                </button>
                            </div>
                        </div>

                        {/* --- PŁÓTNO + PRAWY PANEL --- */}
                        <div className="flex-1 relative flex">
                            
                            <div className="flex-1 relative overflow-hidden bg-white">
                                {shapes.length === 0 && !bgImage.url && currentStroke.length === 0 && (
                                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none select-none z-10">
                                        <p className="text-slate-400 text-lg font-medium text-center">Narysuj coś lub wgraj tło.</p>
                                    </div>
                                )}

                                <svg
                                    ref={svgRef}
                                    className={`w-full h-full touch-none block ${activeTool === 'eraser' ? 'eraser-mode' : activeTool === 'select' ? 'select-mode' : 'cursor-crosshair'}`}
                                    onPointerDown={handlePointerDown}
                                    onPointerMove={handlePointerMove}
                                    onPointerUp={handlePointerUp}
                                    onPointerCancel={handlePointerUp}
                                    onPointerLeave={handlePointerUp}
                                >
                                    {/* DEFINICJE WZORÓW */}
                                    <defs>
                                        {shapes.map((s, i) => {
                                            if (!s.fillPattern) return null;
                                            const { sp, S, W, pWidth, pHeight, layout } = getPatternDetails(s);

                                            const renderContent = (x, y) => {
                                                if (s.fillPattern === 'custom' && s.customPatternSvg) {
                                                    return <image x={x} y={y} width={S} height={S} href={s.customPatternSvg} preserveAspectRatio="xMidYMid meet" />;
                                                } else if (s.fillPattern === 'dots') {
                                                    return <circle cx={x + S/2} cy={y + S/2} r={S*0.2} fill={s.color} />;
                                                } else if (s.fillPattern === 'grid') {
                                                    return <path d={`M ${x+S} ${y} L ${x} ${y} L ${x} ${y+S}`} fill="none" stroke={s.color} strokeWidth={Math.max(1, S*0.05)}/>;
                                                } else if (s.fillPattern === 'lines') {
                                                    return <line x1={x} y1={y+S} x2={x+S} y2={y} stroke={s.color} strokeWidth={Math.max(2, S*0.1)} strokeLinecap="square"/>;
                                                }
                                                return null;
                                            };

                                            return (
                                                <pattern key={`pat-${i}`} id={`pat-${i}`} width={pWidth} height={pHeight} patternUnits="userSpaceOnUse">
                                                    {renderContent(sp/2, sp/2)}
                                                    {(layout === 'offset' || layout === 'hex') && (
                                                        <>
                                                            {renderContent(sp/2 + W/2, sp/2 + (layout === 'hex' ? W*0.866 : W))}
                                                            {renderContent(sp/2 - W/2, sp/2 + (layout === 'hex' ? W*0.866 : W))}
                                                        </>
                                                    )}
                                                </pattern>
                                            );
                                        })}
                                    </defs>

                                    {/* TŁO */}
                                    {bgImage.url && (
                                        <g id="reference-image" transform={`translate(${bgImage.x}, ${bgImage.y}) rotate(${bgImage.angle}) scale(${bgImage.scale})`}>
                                            <image href={bgImage.url} x={-bgImage.width/2} y={-bgImage.height/2} width={bgImage.width} height={bgImage.height} opacity={bgImage.opacity} pointerEvents="none" />
                                        </g>
                                    )}

                                    {/* KSZTAŁTY */}
                                    {shapes.map((shape, i) => {
                                        const isSelected = activeTool === 'select' && selectedShapeIndex === i;
                                        const shapeProps = {
                                            key: i,
                                            fill: shape.fillPattern ? `url(#pat-${i})` : "none",
                                            stroke: shape.color, strokeWidth: 4, strokeLinecap: "round", strokeLinejoin: "round",
                                            onPointerDown: (e) => handleShapeClick(e, i),
                                            style: { pointerEvents: 'all' }, 
                                            className: isSelected ? "opacity-80" : ""
                                        };

                                        let selectionOutline = null;
                                        if (isSelected) {
                                            const outlineProps = { ...shapeProps, stroke: "#0ea5e9", strokeWidth: 8, strokeDasharray: "10,10", fill: "none", opacity: 0.5, style: {pointerEvents: 'none'} };
                                            if (shape.type === 'ellipse') selectionOutline = <ellipse cx={shape.cx} cy={shape.cy} rx={shape.rx} ry={shape.ry} transform={`rotate(${shape.angle} ${shape.cx} ${shape.cy})`} {...outlineProps} />;
                                            else selectionOutline = <path d={shape.d || `M ${shape.points.map(p => `${p.x},${p.y}`).join(' L ')}`} {...outlineProps} />;
                                        }

                                        let renderedShape;
                                        if (shape.type === 'ellipse') renderedShape = <ellipse cx={shape.cx} cy={shape.cy} rx={shape.rx} ry={shape.ry} transform={`rotate(${shape.angle} ${shape.cx} ${shape.cy})`} {...shapeProps} />;
                                        else renderedShape = <path d={shape.d || `M ${shape.points.map(p => `${p.x},${p.y}`).join(' L ')}`} {...shapeProps} />;

                                        return <g key={`g-${i}`}>{renderedShape}{selectionOutline}</g>;
                                    })}
                                    
                                    {/* RYSOWANIE */}
                                    {currentStroke.length > 0 && activeTool !== 'eraser' && activeTool !== 'select' && (
                                        <path d={`M ${currentStroke.map(p => `${p.x},${p.y}`).join(' L ')}`} fill="none" stroke={globalColor} strokeWidth={4} strokeLinecap="round" strokeLinejoin="round" opacity={0.6} />
                                    )}
                                </svg>
                            </div>

                            {/* --- PRAWY PANEL ZAAWANSOWANY --- */}
                            {showRightPanel && (bgImage.url || (activeTool === 'select' && activeShape)) && (
                                <div className="w-72 bg-slate-50 border-l border-slate-200 shadow-2xl flex flex-col p-4 panel-slide z-20 shrink-0 overflow-y-auto">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="font-bold text-slate-800 flex items-center gap-2"><IconSettings /> Opcje</h3>
                                        <button onClick={() => setShowRightPanel(false)} className="text-slate-400 hover:text-slate-600 font-bold text-xl">&times;</button>
                                    </div>

                                    {/* Opcje Tła */}
                                    {bgImage.url && (
                                        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-4">
                                            <h4 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Tło Referencyjne</h4>
                                            <div className="flex justify-between text-xs mb-2 text-slate-600"><span>Krycie</span><span className="font-bold text-emerald-600">{Math.round(bgImage.opacity * 100)}%</span></div>
                                            <input type="range" min="0.1" max="1" step="0.05" value={bgImage.opacity} onChange={(e) => setBgImage(prev => ({...prev, opacity: parseFloat(e.target.value)}))} className="w-full mb-4 accent-emerald-500" />
                                            
                                            <div className="flex gap-2">
                                                <button onClick={() => {
                                                    const r = svgRef.current.getBoundingClientRect();
                                                    const s = Math.min((r.width * 0.8) / bgImage.width, (r.height * 0.8) / bgImage.height);
                                                    setBgImage(prev => ({ ...prev, x: r.width / 2, y: r.height / 2, scale: s, angle: 0 }));
                                                }} className="flex-1 text-xs py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium rounded-lg transition-colors">Wyśrodkuj</button>
                                                <button onClick={() => {setBgImage({url:null}); setShowRightPanel(false);}} className="flex-1 text-xs py-2 bg-red-50 hover:bg-red-100 text-red-600 font-medium rounded-lg transition-colors">Usuń Tło</button>
                                            </div>
                                        </div>
                                    )}

                                    {/* Opcje Wypełnienia i Wzorów */}
                                    {activeTool === 'select' && activeShape && activeShape.fillPattern && (
                                        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                                            <h4 className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-4 flex items-center gap-2"><IconPattern /> Wzór Wypełnienia</h4>
                                            
                                            {/* Opcja dla Własnego SVG */}
                                            {activeShape.fillPattern === 'custom' && (
                                                <div className="mb-5 pb-5 border-b border-slate-100">
                                                    <button onClick={() => patternInputRef.current.click()} className="w-full py-2 bg-amber-50 hover:bg-amber-100 text-amber-700 text-sm font-semibold rounded-lg border border-amber-200 transition-colors flex items-center justify-center gap-2">
                                                        <IconFilePlus /> Wgraj swój plik SVG
                                                    </button>
                                                    {activeShape.customPatternSvg && <p className="text-[10px] text-center text-emerald-600 mt-2 font-medium">Plik SVG pomyślnie załadowany ✓</p>}
                                                </div>
                                            )}

                                            <div className="mb-5">
                                                <label className="block text-xs font-semibold text-slate-600 mb-2">Układ (Tiling)</label>
                                                <select 
                                                    className="w-full text-sm border border-slate-300 rounded-lg p-2 bg-slate-50 outline-none focus:ring-2 ring-amber-200"
                                                    value={activeShape.patternLayout || 'grid'}
                                                    onChange={(e) => updateSelectedShape({ patternLayout: e.target.value })}
                                                >
                                                    <option value="grid">Kwadratowo (Siatka)</option>
                                                    <option value="offset">Ze zjazdem (Cegła)</option>
                                                    <option value="hex">Heksagonalnie</option>
                                                </select>
                                            </div>

                                            <div className="mb-5">
                                                <div className="flex justify-between text-xs mb-2 text-slate-600"><span>Rozmiar elementu</span><span className="font-bold">x{activeShape.patternScale || 1}</span></div>
                                                <input type="range" min="0.2" max="5" step="0.1" value={activeShape.patternScale || 1} onChange={(e) => updateSelectedShape({ patternScale: parseFloat(e.target.value) })} className="w-full accent-amber-500" />
                                            </div>

                                            <div>
                                                <div className="flex justify-between text-xs mb-2 text-slate-600"><span>Odstęp między elementami</span><span className="font-bold">{activeShape.patternSpacing || 0}px</span></div>
                                                <input type="range" min="0" max="100" step="2" value={activeShape.patternSpacing || 0} onChange={(e) => updateSelectedShape({ patternSpacing: parseInt(e.target.value) })} className="w-full accent-amber-500" />
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><CanvasApp /></ErrorBoundary>);
    </script>
</body>
</html>
